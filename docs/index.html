<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SEPA RADAR · 미너비니 스크리너</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<style>
:root{
  --bg:#0A0D12; --surface:#121721; --surface2:#0E1219; --line:#232B3A;
  --ink:#E9EDF5; --muted:#8C96AA; --faint:#5A6478;
  --up:#F0433F; --down:#3D7EFF; --amber:#E8A33D; --slate:#6B7688;
  --pass:#35C77B; --teal:#22C3A6;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --sans:'IBM Plex Sans KR',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14.5px;line-height:1.55;
  padding-bottom:env(safe-area-inset-bottom)}
.wrap{max-width:780px;margin:0 auto;padding:0 14px 60px}
a{color:inherit}

/* ── 헤더 ─────────────────────────────── */
header{position:sticky;top:0;z-index:30;background:rgba(10,13,18,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.hbar{max-width:780px;margin:0 auto;padding:12px 14px 10px;display:flex;align-items:baseline;gap:10px}
.logo{font-family:var(--mono);font-weight:600;font-size:17px;letter-spacing:.22em}
.logo b{color:var(--up);font-weight:600}
.src{margin-left:auto;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
  padding:3px 9px;border-radius:99px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}
.src.live{border-color:rgba(53,199,123,.5);color:var(--pass)}
.src.sample{border-color:rgba(232,163,61,.5);color:var(--amber)}
.tabs{max-width:780px;margin:0 auto;padding:0 14px;display:flex;gap:2px}
.tab{flex:1;text-align:center;padding:9px 0 11px;font-size:13.5px;font-weight:500;color:var(--muted);
  border:none;background:none;cursor:pointer;position:relative;font-family:var(--sans)}
.tab.on{color:var(--ink)}
.tab.on::after{content:'';position:absolute;left:22%;right:22%;bottom:0;height:2px;background:var(--up);border-radius:2px}
.tab .n{font-family:var(--mono);font-size:10px;color:var(--up);margin-left:3px;vertical-align:top}

.banner{margin:12px 0 0;padding:9px 12px;border:1px dashed rgba(232,163,61,.45);border-radius:10px;
  font-size:12.5px;color:var(--amber);background:rgba(232,163,61,.06)}

/* ── 종목 칩 ─────────────────────────── */
.chips{display:flex;gap:8px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:11px;
  border:1px solid var(--line);background:var(--surface2);color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans)}
.chip.on{background:var(--surface);color:var(--ink);border-color:#39445c}
.dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}

/* ── 종목 헤더 + 단계 스트립(시그니처) ── */
.stockhead{display:flex;align-items:flex-end;gap:10px;margin:16px 2px 4px;flex-wrap:wrap}
.stockhead h2{font-size:19px;font-weight:700}
.tk{font-family:var(--mono);font-size:11.5px;color:var(--faint);letter-spacing:.05em}
.px{margin-left:auto;text-align:right}
.px .p{font-family:var(--mono);font-size:19px;font-weight:600}
.px .c{font-family:var(--mono);font-size:12px}
.stagestrip{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:12px 0 0}
.seg{position:relative;padding:9px 8px 8px;border-radius:9px;border:1px solid var(--line);
  background:var(--surface2);opacity:.42}
.seg .no{font-family:var(--mono);font-size:15px;font-weight:600;line-height:1}
.seg .nm{font-size:10.5px;color:var(--muted);margin-top:3px;letter-spacing:.02em}
.seg.on{opacity:1;background:var(--surface);box-shadow:0 0 0 1px var(--segc) inset, 0 4px 18px -6px var(--segc)}
.seg.on .no{color:var(--segc)}
.seg.on::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--segc)}
.stagedesc{margin:9px 2px 0;font-size:12.5px;color:var(--muted)}
.stagedesc b{color:var(--ink);font-weight:500}
.conf{font-family:var(--mono);font-size:10.5px;color:var(--faint)}

/* ── 카드 공통 ───────────────────────── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-top:14px;overflow:hidden}
.card .hd{display:flex;align-items:center;gap:8px;padding:12px 14px 0;font-size:12px;font-weight:700;
  letter-spacing:.14em;color:var(--faint);font-family:var(--mono)}
#chart{width:100%;height:398px}

/* ── 체크리스트 ─────────────────────── */
.cl{padding:8px 6px 10px}
.clrow{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:9px}
.clrow:nth-child(even){background:var(--surface2)}
.mark{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:11px;flex:0 0 auto;font-weight:700}
.mark.ok{background:rgba(53,199,123,.13);color:var(--pass)}
.mark.no{background:rgba(240,67,63,.13);color:var(--up)}
.cltxt{flex:1;font-size:13px}
.clval{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;white-space:nowrap}
.clsum{padding:10px 14px 13px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--line)}
.clsum .big{font-family:var(--mono);font-size:16px;font-weight:600}
.clsum .lbl{font-size:12px;color:var(--muted)}

/* ── VCP 카드 + 수축 발자국 ─────────── */
.vcpbody{padding:12px 14px 14px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;
  font-size:12.5px;font-weight:600;border:1px solid}
.foot{display:flex;align-items:flex-end;gap:7px;height:74px;margin:14px 2px 4px}
.fbar{flex:0 0 34px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;height:100%}
.fbar .bar{width:100%;border-radius:5px 5px 3px 3px;background:linear-gradient(180deg,var(--up),rgba(240,67,63,.25))}
.fbar .pv{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
.foot .arrow{color:var(--faint);font-size:11px;padding-bottom:14px}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;margin-top:12px}
.kv div{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);
  border-bottom:1px dashed rgba(35,43,58,.8);padding-bottom:5px}
.kv b{font-family:var(--mono);font-weight:600;color:var(--ink)}
.notes{margin-top:11px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.9}

/* ── 신호 탭 ─────────────────────────── */
.sec{margin-top:20px;font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--faint);font-family:var(--mono)}
.sig{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--surface);
  border:1px solid var(--line);border-radius:13px;margin-top:9px;cursor:pointer}
.sig:active{background:var(--surface2)}
.sig .nm{font-weight:600;font-size:14.5px}
.sig .meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:3px}
.sig .right{margin-left:auto;text-align:right}
.sig .dist{font-family:var(--mono);font-size:14px;font-weight:600}
.sig .sub{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:2px}
.empty{margin-top:10px;padding:18px;border:1px dashed var(--line);border-radius:13px;
  color:var(--muted);font-size:13px;text-align:center}
.back{display:inline-flex;align-items:center;gap:6px;margin:14px 0 0;padding:7px 13px;border-radius:9px;
  border:1px solid var(--line);background:var(--surface2);color:var(--muted);font-size:12.5px;cursor:pointer;font-family:var(--sans)}

/* ── 기준 탭 ─────────────────────────── */
.doc{margin-top:16px;font-size:13.5px;color:#c7cedd}
.doc h3{font-size:13px;font-family:var(--mono);letter-spacing:.12em;color:var(--faint);margin:20px 0 8px}
.doc table{width:100%;border-collapse:collapse;font-size:12.5px}
.doc td,.doc th{border-bottom:1px solid var(--line);padding:7px 6px;text-align:left;vertical-align:top}
.doc th{color:var(--muted);font-weight:500;white-space:nowrap}
.doc p{margin:7px 0}
.doc .warn{color:var(--amber)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

</header>

</div>

const C = {up:'#F0433F',down:'#3D7EFF',amber:'#E8A33D',slate:'#6B7688',
           pass:'#35C77B',teal:'#22C3A6',muted:'#8C96AA',faint:'#5A6478'};
const STAGE_COLOR = {0:C.faint,1:C.slate,2:C.up,3:C.amber,4:C.down};
const STAGE_SHORT = {1:'기반 다지기',2:'상승 추세',3:'천장 형성',4:'하락 추세'};
const VCP_LABEL = {
  BREAKOUT:['🚀 피벗 돌파 — 매수 신호',C.up], BREAKOUT_WEAK:['피벗 돌파 · 거래량 미달',C.amber],
  BUY_RANGE:['매수 범위 · 피벗 +5% 이내',C.up], NEAR:['돌파 임박 · 피벗 -3% 이내',C.amber],
  FORMING:['베이스 형성 중',C.teal], EXTENDED:['확장 국면 — 추격 금지',C.slate],
  NONE:['유효 VCP 없음',C.faint]
};
const nf = new Intl.NumberFormat('ko-KR');
const fmt = v => v==null ? '—' : nf.format(Math.round(v));
const pct = (v,s=1)=> v==null ? '—' : (v>0?'+':'')+v.toFixed(s)+'%';

const S = {live:false, meta:null, holdings:[], signals:{breakout:[],near:[]},
           ohlcv:{}, cur:null, tab:'hold', from:'hold', chart:null};

async function fetchJson(p){ const r = await fetch(p,{cache:'no-store'}); if(!r.ok) throw 0; return r.json(); }

async function loadData(){
  try{
    S.meta = await fetchJson('./data/meta.json');
    S.holdings = await fetchJson('./data/holdings.json');
    S.signals = await fetchJson('./data/signals.json');
    S.live = true;
  }catch(e){
    const s = window.__SAMPLE__;
    if(!s){ document.getElementById('banner').innerHTML =
      '<div class="banner">데이터를 찾을 수 없습니다. 파이프라인(run_daily.py) 실행 후 docs/를 서버로 열어주세요.</div>'; return false; }
    S.meta = s.meta; S.holdings = s.holdings; S.signals = s.signals; S.ohlcv = s.ohlcv||{};
  }
  return true;
}
async function getChart(t){
  if(S.ohlcv[t]) return S.ohlcv[t];
  if(S.live){ try{ S.ohlcv[t] = await fetchJson('./data/ohlcv/'+t+'.json'); return S.ohlcv[t]; }catch(e){ return null; } }
  return null;
}

/* ── 렌더: 보유종목 ── */
function renderHold(){
  const el = document.getElementById('view-hold');
  if(!S.holdings.length){ el.innerHTML = '<div class="empty">config.json의 holdings에 보유 종목 코드를 등록하세요.</div>'; return; }
  const chips = S.holdings.map(h=>`
    <button class="chip ${h.ticker===S.cur?'on':''}" data-t="${h.ticker}">
      <span class="dot" style="background:${STAGE_COLOR[h.stage.stage]}"></span>${h.name}
    </button>`).join('');
  el.innerHTML = `<div class="chips">${chips}</div><div id="detail"></div>`;
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{S.cur=b.dataset.t;S.from='hold';renderHold();});
  renderDetail(document.getElementById('detail'), S.cur, false);
}

async function renderDetail(box, t, withBack){
  const d = await getChart(t);
  const sum = S.holdings.find(h=>h.ticker===t);
  const a = d ? d.analysis : sum;
  if(!a){ box.innerHTML = '<div class="empty">차트 데이터가 없습니다.</div>'; return; }
  const st = a.stage, tp = a.template, v = a.vcp;
  const sc = STAGE_COLOR[st.stage];
  const upc = a.change_pct>=0 ? C.up : C.down;

  const segs = [1,2,3,4].map(n=>`
    <div class="seg ${n===st.stage?'on':''}" style="--segc:${STAGE_COLOR[n]}">
      <div class="no">${n}</div><div class="nm">${STAGE_SHORT[n]}</div>
    </div>`).join('');

  const L = S.meta.template_labels || {};
  const rows = Object.entries(tp.conds).map(([k,ok])=>`
    <div class="clrow">
      <div class="mark ${ok?'ok':'no'}">${ok?'✓':'✗'}</div>
      <div class="cltxt">${L[k]||k}</div>
      <div class="clval">${clVal(k,tp.values)}</div>
    </div>`).join('');

  const [vl,vc] = VCP_LABEL[v.status]||VCP_LABEL.NONE;
  const maxd = Math.max(...(v.depths.length?v.depths:[1]));
  const foot = v.depths.map((dep,i)=>`
    ${i? '<div class="arrow">›</div>':''}
    <div class="fbar"><div class="bar" style="height:${Math.max(14, dep/maxd*58)}px"></div><div class="pv">-${dep}%</div></div>`).join('');

  box.innerHTML = `
    ${withBack?'<button class="back" id="back">‹ 신호 목록</button>':''}
    <div class="stockhead">
      <div><h2>${d?d.name:sum.name}</h2><div class="tk">${t} · KRX</div></div>
      <div class="px"><div class="p">${fmt(a.close)}</div>
        <div class="c" style="color:${upc}">${pct(a.change_pct,2)}</div></div>
    </div>
    <div class="stagestrip">${segs}</div>
    <div class="stagedesc"><b>${st.label}</b> — ${st.desc}
      <span class="conf">· 구조 일치 ${(st.confidence*100).toFixed(0)}%</span></div>

    <div class="card"><div class="hd">DAILY CHART · MA 50/150/200</div><div id="chart"></div></div>

    <div class="card"><div class="hd">TREND TEMPLATE 8</div>
      <div class="cl">${rows}</div>
      <div class="clsum"><span class="big" style="color:${tp.passed>=7?C.pass:tp.passed>=5?C.amber:C.up}">${tp.passed} / 8</span>
        <span class="lbl">${tp.passed===8?'전 조건 충족 — 2단계 후보':tp.passed>=7?'준충족 — 관찰 대상':'기준 미달'}</span></div>
    </div>

    <div class="card"><div class="hd">VCP · 매수 타이밍</div>
      <div class="vcpbody">
        <span class="pill" style="color:${vc};border-color:${vc}55;background:${vc}14">${vl}</span>
        ${v.depths.length?`<div class="foot">${foot}</div>`:''}
        <div class="kv">
          <div><span>피벗(매수점)</span><b>${fmt(v.pivot)}</b></div>
          <div><span>피벗 이격</span><b>${pct(v.dist_to_pivot_pct,2)}</b></div>
          <div><span>베이스 기간</span><b>${v.base_days||'—'}일</b></div>
          <div><span>수축 발자국</span><b>${v.footprint||'—'}</b></div>
          <div><span>드라이업(5d/50d)</span><b>${v.vdu??'—'}</b></div>
          <div><span>당일 거래량 배수</span><b>${v.vol_ratio??'—'}×</b></div>
        </div>
        ${v.notes&&v.notes.length?`<div class="notes">${v.notes.join('<br>')}</div>`:''}
      </div>
    </div>`;

  if(withBack) document.getElementById('back').onclick=()=>{S.tab='sig';show();};
  if(d) drawChart(d);
  else document.getElementById('chart').outerHTML = '<div class="empty" style="margin:12px">차트 데이터 없음 — 요약만 표시</div>';
}

function clVal(k,val){
  const f=fmt, p=pct;
  switch(k){
    case 'T1': return `${f(val.close)} vs ${f(val.ma150)}·${f(val.ma200)}`;
    case 'T2': return `${f(val.ma150)} vs ${f(val.ma200)}`;
    case 'T3': return `1M ${val.ma200_slope1m>0?'+':''}${f(val.ma200_slope1m)}`;
    case 'T4': return `MA50 ${f(val.ma50)}`;
    case 'T5': return `${f(val.close)} vs ${f(val.ma50)}`;
    case 'T6': return `${p(val.pct_above_lo52)} (기준 +30%)`;
    case 'T7': return `${p(val.pct_from_hi52)} (기준 -25%)`;
    case 'T8': return `RS ${val.rs??'—'} (기준 70)`;
    default: return '';
  }
}

/* ── 차트 ── */
function drawChart(d){
  const el = document.getElementById('chart'); if(!el||typeof echarts==='undefined') return;
  if(S.chart){S.chart.dispose();}
  S.chart = echarts.init(el);
  const dates = d.rows.map(r=>r[0]);
  const candles = d.rows.map(r=>[r[1],r[4],r[3],r[2]]);           // [o,c,l,h]
  const vols = d.rows.map(r=>({value:r[5], itemStyle:{color:(r[4]>=r[1]?C.up:C.down)+'99'}}));
  const start = Math.max(0, 100*(1-135/dates.length));
  const piv = d.analysis.vcp.pivot;
  S.chart.setOption({
    animation:false,
    axisPointer:{link:[{xAxisIndex:'all'}],label:{backgroundColor:'#1c2432'}},
    tooltip:{trigger:'axis',axisPointer:{type:'cross'},backgroundColor:'#141a26',
      borderColor:'#2a3346',textStyle:{color:'#dfe6f2',fontSize:11,fontFamily:'IBM Plex Mono'},
      valueFormatter:v=>v==null?'-':nf.format(Math.round(v))},
    grid:[{left:8,right:52,top:14,height:252},{left:8,right:52,top:288,height:74}],
    xAxis:[
      {type:'category',data:dates,boundaryGap:true,axisLine:{lineStyle:{color:'#2a3346'}},
       axisLabel:{color:C.faint,fontSize:9.5,fontFamily:'IBM Plex Mono'},axisTick:{show:false}},
      {type:'category',gridIndex:1,data:dates,axisLabel:{show:false},axisLine:{lineStyle:{color:'#2a3346'}},axisTick:{show:false}}
    ],
    yAxis:[
      {scale:true,position:'right',splitLine:{lineStyle:{color:'#1a2130'}},
       axisLabel:{color:C.faint,fontSize:9.5,fontFamily:'IBM Plex Mono',formatter:v=>nf.format(v)}},
      {gridIndex:1,scale:true,position:'right',splitLine:{show:false},
       axisLabel:{color:C.faint,fontSize:9,fontFamily:'IBM Plex Mono',formatter:v=>v>=1e6?(v/1e6).toFixed(1)+'M':(v/1e3).toFixed(0)+'K'}}
    ],
    dataZoom:[{type:'inside',xAxisIndex:[0,1],start,end:100},
      {type:'slider',xAxisIndex:[0,1],start,end:100,height:15,bottom:2,
       borderColor:'#2a3346',backgroundColor:'#0e1219',fillerColor:'rgba(140,150,170,.12)',
       handleStyle:{color:'#3a4560'},textStyle:{color:C.faint,fontSize:9}}],
    series:[
      {name:'일봉',type:'candlestick',data:candles,
        itemStyle:{color:C.up,color0:C.down,borderColor:C.up,borderColor0:C.down},
        markLine: piv?{symbol:'none',silent:true,lineStyle:{color:C.amber,type:'dashed',width:1},
          label:{color:C.amber,fontSize:9.5,fontFamily:'IBM Plex Mono',formatter:'피벗 '+nf.format(Math.round(piv))},
          data:[{yAxis:piv}]}:undefined},
      {name:'MA50',type:'line',data:d.ma50,showSymbol:false,lineStyle:{width:1.1,color:C.amber},emphasis:{disabled:true}},
      {name:'MA150',type:'line',data:d.ma150,showSymbol:false,lineStyle:{width:1.1,color:C.teal},emphasis:{disabled:true}},
      {name:'MA200',type:'line',data:d.ma200,showSymbol:false,lineStyle:{width:1.3,color:'#9AA5BC'},emphasis:{disabled:true}},
      {name:'거래량',type:'bar',xAxisIndex:1,yAxisIndex:1,data:vols,barWidth:'62%'}
    ]
  });
  new ResizeObserver(()=>S.chart&&S.chart.resize()).observe(el);
}

/* ── 렌더: 신호 ── */
function renderSig(){
  const el = document.getElementById('view-sig');
  const mk = s=>{
    const col = s.status==='BREAKOUT'?C.up : s.status==='NEAR'?C.amber : C.muted;
    return `<div class="sig" data-t="${s.ticker}">
      <div><div class="nm">${s.name} <span class="tk">${s.ticker}</span></div>
        <div class="meta">피벗 ${fmt(s.pivot)} · ${s.footprint} · 베이스 ${s.base_days}일 · RS ${Math.round(s.rs)}</div></div>
      <div class="right"><div class="dist" style="color:${col}">${pct(s.dist_to_pivot_pct,1)}</div>
        <div class="sub">${s.status==='NEAR'?'피벗까지':'거래량 '+(s.vol_ratio??'—')+'×'}</div></div>
    </div>`;
  };
  const b = S.signals.breakout||[], n = S.signals.near||[];
  el.innerHTML = `
    <div class="sec">🚀 오늘 피벗 돌파 — 종가 확정 기준</div>
    ${b.length? b.map(mk).join('') : '<div class="empty">오늘 확정된 돌파 신호가 없습니다.</div>'}
    <div class="sec">👀 돌파 임박 — 피벗 -3% 이내 (내일 감시 목록)</div>
    ${n.length? n.map(mk).join('') : '<div class="empty">임박 종목이 없습니다.</div>'}
    <div id="sigdetail"></div>`;
  el.querySelectorAll('.sig').forEach(x=>x.onclick=()=>{
    el.innerHTML = '<div id="sigdetail"></div>';
    renderDetail(document.getElementById('sigdetail'), x.dataset.t, true);
    window.scrollTo({top:0});
  });
}

      <tr><th style="color:${C.amber}">3 천장</th><td>변동성 확대·분산. 신규 매수 금지, 보유분 트레일링.</td></tr>

}

/* ── 탭 전환 ── */
function show(){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===S.tab));
  for(const k of ['hold','sig','doc']) document.getElementById('view-'+k).hidden = (k!==S.tab);
  if(S.tab==='hold') renderHold();
  if(S.tab==='sig') renderSig();
  if(S.tab==='doc') renderDoc();
}

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;show();});

loadData().then(ok=>{
  if(!ok) return;
  const src = document.getElementById('src');
  if(S.meta.sample){ src.textContent = 'SAMPLE · '+S.meta.data_date; src.className='src sample';
    document.getElementById('banner').innerHTML =
      '<div class="banner">지금 보는 것은 <b>샘플 데이터</b>입니다. run_daily.py 첫 실행(또는 Actions 가동) 후 실제 KRX 데이터로 대체됩니다.</div>';
  } else { src.textContent = 'LIVE · '+S.meta.data_date; src.className='src live'; }
  const nSig = (S.signals.breakout||[]).length;
  if(nSig) document.getElementById('sigN').textContent = nSig;
  S.cur = S.holdings.length ? S.holdings[0].ticker : null;
  show();
});
</script>
