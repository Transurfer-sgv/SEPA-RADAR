name: SEPA RADAR daily scan

on:
  schedule:
    - cron: "40 8 * * 1-5"   # 평일 17:40 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sepa-radar-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore OHLCV cache
        uses: actions/cache@v4
        with:
          path: cache
          key: ohlcv-${{ github.run_id }}
          restore-keys: |
            ohlcv-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run daily scan
        run: python run_daily.py

      - name: Commit results
        run: |
          git config user.name "sepa-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet || git commit -m "scan: $(date +'%Y-%m-%d')"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
